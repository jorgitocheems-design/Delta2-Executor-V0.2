<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta2 Executor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121620;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            background-color: #1a2232;
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px; /* Lo agrandé un poquito para que los comentarios queden cómodos */
            text-align: center;
        }

        .header-box {
            background-color: #00ffff;
            color: #121620;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .emoji-rocket {
            font-size: 30px;
            display: block;
            margin-top: 5px;
        }

        p {
            font-size: 16px;
            color: #b0bddb;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .divider {
            height: 2px;
            background-color: #00ffff;
            margin: 20px 0;
            opacity: 0.5;
        }

        h2 {
            font-size: 22px;
            color: #00ffff;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            background-color: #00ffff;
            color: #121620;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 10px;
            width: 100%;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 10px #00ffff;
        }

        /* Caja para que los comentarios combinen con el diseño oscuro */
        .comments-section {
            background-color: #151a26;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            border: 1px solid #00ffff33;
        }

        .comments-title {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-box">
            Delta2 Executor
            <span class="emoji-rocket">🚀</span>
        </div>

        <p>¡Bienvenido a la web oficial! El proyecto definitivo está aquí de la mano de Cheems Studio.</p>

        <div class="divider"></div>

        <h2>¿Qué es Delta2?</h2>
        <p>Una herramienta optimizada, rápida y hecha por programadores de verdad. ¡Pasamos de Scratch a código real con estilo! 🤖🎒</p>

        <a href="https://drive.google.com/uc?export=download&id=165gEuBCUuuQAESBs2L0bBfxGpw4JoUhu" class="btn">
            ¡Descargar Delta2 Aquí! 🤟🤑
        </a>

        <div class="divider"></div>

        <div class="comments-section">
            <div class="comments-title">💬 Zona de Opiniones</div>
            
            <div id="disqus_thread"></div>
            
            <script>
                var disqus_config = function () {
                    this.page.url = "https://jorgitocheems-design.github.io/Delta2-Executor-V0.2/delta2webexecutor.html";  
                    this.page.identifier = "delta2webexecutor_page"; 
                };

                (function() { 
                    var d = document, s = d.createElement('script');
                    // REEMPLAZA "TU-SHORTNAME" en el paso de abajo para que se active
                    s.src = 'https://TU-SHORTNAME.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
        </div>
    </div>

</body>
  </html>
