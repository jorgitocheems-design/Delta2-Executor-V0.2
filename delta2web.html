<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta2 Executor</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #121620;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #ffffff;
        }

        .container {
            background-color: #1a2232;
            border: 3px solid #00ffff;
            box-shadow: 0 0 20px #00ffff;
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .header-box {
            background-color: #00ffff;
            color: #121620;
            padding: 15px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .emoji-rocket {
            font-size: 30px;
            display: block;
            margin-top: 5px;
        }

        p {
            font-size: 16px;
            color: #b0bddb;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .divider {
            height: 2px;
            background-color: #00ffff;
            margin: 20px 0;
            opacity: 0.5;
        }

        h2 {
            font-size: 22px;
            color: #00ffff;
            margin-bottom: 15px;
        }

        .btn {
            display: inline-block;
            background-color: #00ffff;
            color: #121620;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 10px;
            width: 100%;
            margin-top: 15px;
            margin-bottom: 25px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 0 10px #00ffff;
        }

        /* Sección de Comentarios Nueva */
        .comments-section {
            background-color: #151a26;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            border: 1px solid #00ffff33;
            margin-top: 20px;
        }

        .comments-title {
            font-size: 18px;
            color: #00ffff;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">

            ¡Descargar Delta2 Aquí! 🤟🤑
        </a>

        <div class="divider"></div>

        <div class="comments-section">
